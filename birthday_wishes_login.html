
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .bd-wrap {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 40%, #1a1060 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }

  .stars {
    position: absolute; inset: 0; pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle 2s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1.2); }
  }

  .balloon {
    position: absolute;
    width: 40px;
    height: 50px;
    border-radius: 50%;
    animation: floatUp 6s ease-in-out infinite;
    opacity: 0.7;
  }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }

  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 10;
  }

  .cake-icon {
    text-align: center;
    font-size: 52px;
    margin-bottom: 0.5rem;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .title {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    color: #FFD700;
    text-align: center;
    margin-bottom: 0.25rem;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
  }

  .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    margin-bottom: 2rem;
    letter-spacing: 0.5px;
  }

  .confetti-line {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 1.5rem;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    animation: colorCycle 2s linear infinite;
  }

  @keyframes colorCycle {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .field-group { margin-bottom: 1.25rem; }

  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .field-wrap {
    position: relative;
  }

  .field-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: rgba(255,255,255,0.4);
  }

  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 12px 14px 12px 42px;
    color: #fff;
    font-size: 15px;
    font-family: 'Nunito', sans-serif;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }

  .field-input::placeholder { color: rgba(255,255,255,0.3); }

  .field-input:focus {
    border-color: #FFD700;
    background: rgba(255,215,0,0.06);
    box-shadow: 0 0 0 3px rgba(255,215,0,0.15);
  }

  .toggle-pass {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    font-size: 18px;
    padding: 2px;
  }

  .toggle-pass:hover { color: rgba(255,255,255,0.8); }

  .forgot {
    text-align: right;
    margin-top: 6px;
  }

  .forgot a {
    font-size: 12px;
    color: #FFD700;
    text-decoration: none;
    opacity: 0.8;
  }

  .forgot a:hover { opacity: 1; text-decoration: underline; }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
    border: none;
    border-radius: 12px;
    color: #1a0533;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255,140,0,0.4);
  }

  .btn-login:active { transform: scale(0.98); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem 0;
  }

  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

  .divider-text { font-size: 12px; color: rgba(255,255,255,0.35); }

  .btn-social {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, border-color 0.2s;
    margin-bottom: 0.75rem;
  }

  .btn-social:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.3);
  }

  .signup-row {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
  }

  .signup-row a {
    color: #FFD700;
    text-decoration: none;
    font-weight: 600;
  }

  .signup-row a:hover { text-decoration: underline; }

  .flash-msg {
    display: none;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 10px;
    padding: 10px 14px;
    color: #FFD700;
    font-size: 14px;
    text-align: center;
    margin-bottom: 1rem;
  }

  .flash-msg.show { display: block; animation: fadeIn 0.4s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
</style>

<div class="bd-wrap">
  <div class="stars" id="stars"></div>

  <div class="card" role="main">
    <div class="cake-icon">🎂</div>
    <h1 class="title">Happy Birthday!</h1>
    <p class="subtitle">Sign in to celebrate with your loved ones 🎉</p>

    <div class="confetti-line">
      <div class="dot" style="background:#FF6B6B; animation-delay:0s"></div>
      <div class="dot" style="background:#FFD700; animation-delay:0.2s"></div>
      <div class="dot" style="background:#7EB8F7; animation-delay:0.4s"></div>
      <div class="dot" style="background:#FF6B6B; animation-delay:0.6s"></div>
      <div class="dot" style="background:#FFD700; animation-delay:0.8s"></div>
      <div class="dot" style="background:#A78BFA; animation-delay:1s"></div>
      <div class="dot" style="background:#FF6B6B; animation-delay:1.2s"></div>
    </div>

    <div class="flash-msg" id="flash">🎊 Welcome to the party!</div>

    <div class="field-group">
      <label class="field-label" for="email">Email address</label>
      <div class="field-wrap">
        <i class="ti ti-mail field-icon" aria-hidden="true"></i>
        <input class="field-input" type="email" id="email" placeholder="your@email.com" />
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="password">Password</label>
      <div class="field-wrap">
        <i class="ti ti-lock field-icon" aria-hidden="true"></i>
        <input class="field-input" type="password" id="password" placeholder="Enter your password" />
        <button class="toggle-pass" id="togglePass" aria-label="Show or hide password" type="button">
          <i class="ti ti-eye" id="eyeIcon"></i>
        </button>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-login" id="loginBtn" type="button">🎈 Sign in & Celebrate</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-social" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button class="btn-social" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
      </svg>
      Continue with Facebook
    </button>

    <p class="signup-row">New here? <a href="#">Create your account</a></p>
  </div>
</div>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s`;
    starsEl.appendChild(s);
  }

  const balloonColors = ['#FF6B6B','#FFD700','#7EB8F7','#A78BFA','#FF9F43'];
  const positions = [5, 15, 82, 92, 50];
  positions.forEach((left, i) => {
    const b = document.createElement('div');
    b.className = 'balloon';
    b.style.cssText = `background:${balloonColors[i]};left:${left}%;bottom:${10+i*12}%;animation-delay:${i*1.2}s;animation-duration:${4+i*0.8}s`;
    starsEl.appendChild(b);
  });

  const togglePass = document.getElementById('togglePass');
  const pwdInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');
  togglePass.addEventListener('click', () => {
    const isHidden = pwdInput.type === 'password';
    pwdInput.type = isHidden ? 'text' : 'password';
    eyeIcon.className = isHidden ? 'ti ti-eye-off' : 'ti ti-eye';
  });

  document.getElementById('loginBtn').addEventListener('click', () => {
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('password').value;
    const flash = document.getElementById('flash');
    if (!email || !pwd) {
      flash.textContent = '🎁 Please enter your email and password!';
      flash.style.background = 'rgba(255,100,100,0.15)';
      flash.style.borderColor = 'rgba(255,100,100,0.4)';
      flash.style.color = '#FF8A8A';
    } else {
      flash.textContent = '🎊 Welcome to the party!';
      flash.style.background = 'rgba(255,215,0,0.15)';
      flash.style.borderColor = 'rgba(255,215,0,0.4)';
      flash.style.color = '#FFD700';
    }
    flash.classList.remove('show');
    void flash.offsetWidth;
    flash.classList.add('show');
  });
</script>
